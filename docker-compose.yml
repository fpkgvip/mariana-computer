services:
  mariana-orchestrator:
    build: .
    container_name: mariana-orchestrator
    restart: unless-stopped
    env_file: .env
    volumes:
      - mariana-data:/data/mariana
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mariana-net
      # Orchestrator talks to the sandbox over the internal-only network.
      - mariana-sandbox-net
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 8g

  mariana-api:
    build: .
    container_name: mariana-api
    command:
      - python
      - -m
      - uvicorn
      - mariana.api:app
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - mariana-data:/data/mariana
    networks:
      - mariana-net
      # API needs sandbox access too — e.g. to serve /api/workspace file reads.
      - mariana-sandbox-net
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 4g

  postgresql:
    image: pgvector/pgvector:pg16
    container_name: mariana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mariana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env or environment}
      POSTGRES_DB: ${POSTGRES_DB:-mariana}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mariana}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mariana-net
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # Postgres entrypoint needs these to drop privileges from root -> postgres
    # and to set up /var/lib/postgresql/data permissions on first boot.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    mem_limit: 8g

  redis:
    image: redis:7-alpine
    container_name: mariana-redis
    restart: unless-stopped
    # BUG-S2-14 fix: bind Redis to the internal network only (no port mapping)
    # and require a password. REDIS_PASSWORD must be set in .env and
    # REDIS_URL must be of the form redis://:<password>@redis:6379/0.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env or environment}
    # Use ``sh -c`` so that ${REDIS_PASSWORD} is expanded by the container shell
    # (redis-server itself does not expand env vars in its CLI flags). The
    # ``$$`` escape keeps docker-compose from trying to interpolate at compose
    # parse time, so the literal ``$REDIS_PASSWORD`` makes it into the shell.
    command:
      - sh
      - -c
      - >-
        exec redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 4gb
        --maxmemory-policy allkeys-lru
        --bind 0.0.0.0
        --protected-mode yes
        --requirepass "$$REDIS_PASSWORD"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mariana-net
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # Redis entrypoint needs these to drop privileges from root -> redis
    # and to own /data on first boot.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    mem_limit: 512m

  # ------------------------------------------------------------------
  # Sandbox — executes untrusted user code (Python / TS / Bash / Rust).
  #
  # Security posture:
  #   * Attached to `mariana-sandbox-net` (internal: true), so the container
  #     has NO route to the public internet, the host, or any other service
  #     except the orchestrator / api.
  #   * cap_drop ALL, no-new-privileges, read_only root fs, tmpfs for /tmp.
  #   * User code runs as uid 1000 inside its own setsid()-isolated process
  #     group with strict rlimits (memory, CPU, fds, nproc, fsize).
  #   * Path traversal in /workspace is blocked by the FastAPI server.
  #   * Auth: shared secret (SANDBOX_SHARED_SECRET) required on every call.
  # ------------------------------------------------------------------
  mariana-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: mariana-sandbox:latest
    container_name: mariana-sandbox
    restart: unless-stopped
    environment:
      SANDBOX_SHARED_SECRET: ${SANDBOX_SHARED_SECRET:?SANDBOX_SHARED_SECRET must be set in .env}
      WORKSPACE_ROOT: /workspace
    volumes:
      - mariana-workspace:/workspace:rw
    tmpfs:
      - /tmp/sandbox:size=2g,mode=1777,exec
      - /tmp:size=128m,mode=1777
    read_only: true
    networks:
      - mariana-sandbox-net
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # Sandbox server must run as root to setuid into the sandbox user after
    # fork().  SETGID/SETUID are required for that drop.  DAC_OVERRIDE lets
    # the server chown newly-created files to uid 1000.  Everything else
    # remains dropped.
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
      - KILL
    pids_limit: 1024
    mem_limit: 6g
    cpus: 4.0

  # ------------------------------------------------------------------
  # Browser pool — real Playwright/Chromium contexts.  Kept on the main
  # mariana-net so Playwright can actually browse the real internet.
  # ------------------------------------------------------------------
  mariana-browser:
    build:
      context: .
      dockerfile: Dockerfile.browser
    image: mariana-browser:latest
    container_name: mariana-browser
    restart: unless-stopped
    environment:
      BROWSER_SHARED_SECRET: ${SANDBOX_SHARED_SECRET:?SANDBOX_SHARED_SECRET must be set in .env}
      BROWSER_POOL_SIZE: "4"
    networks:
      - mariana-net
    shm_size: "1gb"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    pids_limit: 1024
    mem_limit: 4g
    cpus: 2.0

volumes:
  postgres-data:
  redis-data:
  mariana-data:
  mariana-workspace:

networks:
  mariana-net:
    driver: bridge
  # Internal-only network for the sandbox.  `internal: true` means Docker
  # does NOT attach a gateway — containers on this network have no route to
  # the host, the public internet, or any service on other networks.
  mariana-sandbox-net:
    driver: bridge
    internal: true
