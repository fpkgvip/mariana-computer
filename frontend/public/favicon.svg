<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0F1A2E"/>
  <!-- Mariana "M" — geometric, editorial style using paths instead of text -->
  <!-- Two vertical strokes with a centered V-notch, inspired by serif M letterforms -->
  <path d="M8 24V9.5L16 17.5L24 9.5V24" fill="none" stroke="#C9A96E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle baseline serif accents -->
  <line x1="6.5" y1="24" x2="9.5" y2="24" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22.5" y1="24" x2="25.5" y2="24" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round"/>
</svg>
