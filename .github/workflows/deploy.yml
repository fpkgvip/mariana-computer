name: Deploy to Hetzner

on:
  push:
    branches: [master]
  workflow_dispatch:

# CC-13 supply-chain hardening: minimum top-level permissions.  This
# deploy job only needs to read the repo at the pinned ref and then
# hand off to the remote host over SSH; no GitHub-side write scopes
# are required.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # CC-12 supply-chain hardening: third-party Marketplace action
      # pinned to a 40-char commit SHA so that a future tag-rewrite of
      # appleboy/ssh-action cannot transparently inject code into the
      # production deploy path.  Bump the SHA + comment together when
      # upgrading.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/mariana

            # Force-sync to latest master (local modifications are expected)
            git fetch origin master
            git reset --hard origin/master
            git clean -fd --exclude=.env

            # Build and restart (only api + orchestrator, keep DB/Redis running)
            docker compose build --no-cache mariana-api mariana-orchestrator
            docker compose up -d --force-recreate mariana-api mariana-orchestrator

            # Wait for health
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/api/health >/dev/null 2>&1; then
                echo "✓ API healthy"
                exit 0
              fi
              echo "Waiting for API... ($i/12)"
              sleep 5
            done
            echo "WARNING: API not responding after 60s"
            docker compose logs --tail=50
            exit 1
